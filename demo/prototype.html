<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>HashTap, Demo Prototipi</title>
<link rel="stylesheet" href="shared.css"/>
<style>
  .hub-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10,14,26,0.8); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-subtle);
    padding: 14px 28px; display: flex; justify-content: space-between; align-items: center;
  }
  .hub-logo { display: flex; align-items: center; gap: 12px; }
  .hub-logo img { width: 30px; height: 30px; }
  .hub-title { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
  .hub-sub { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
  .hub-nav { display: flex; gap: 8px; }
  .hub-nav a { padding: 8px 14px; border-radius: 10px; background: var(--bg-glass); color: var(--text-secondary); text-decoration: none; font-size: 13px; font-weight: 600; border: 1px solid var(--border-subtle); transition: all 180ms; }
  .hub-nav a:hover { background: var(--bg-glass-strong); color: var(--text-primary); }
  .hub-nav a.active { background: var(--brand-500); color: white; border-color: var(--brand-500); }

  #root { padding-top: 60px; min-height: 100vh; background: var(--gradient-page); }
</style>
</head>
<body>
<div class="hub-header">
  <div class="hub-logo">
    <img src="assets/logo-mark.svg"/>
    <div>
      <div class="hub-title">HashTap</div>
      <div class="hub-sub">Canlı demo · tüm yüzeyler</div>
    </div>
  </div>
  <nav class="hub-nav">
    <a href="index.html">← Ana Sayfa</a>
    <a href="prototype.html" class="active">Prototip</a>
    <a href="sunum.html">Sunum</a>
    <a href="docs.html">Doküman</a>
  </nav>
</div>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components/CustomerPWA.jsx"></script>
<script type="text/babel" src="components/KDS.jsx"></script>
<script type="text/babel" src="components/CashierPanel.jsx"></script>
<script type="text/babel" src="components/WaiterApp.jsx"></script>

<script type="text/babel">
const { useState } = React;

function Hero() {
  return (
    <div style={{padding:'40px 28px 20px', maxWidth: 1600, margin:'0 auto'}}>
      <div style={{fontSize: 12, color:'var(--brand-500)', fontWeight: 700, textTransform:'uppercase', letterSpacing:'0.12em', marginBottom: 12}}>
        ⬢ CANLI DEMO · TÜM ÜRÜN YÜZEYLERİ
      </div>
      <div style={{fontSize: 52, fontWeight: 800, letterSpacing:'-0.03em', lineHeight: 1.05, maxWidth: 900}}>
        HashTap'in tüm yazılımı<br/>
        <span style={{color:'var(--brand-500)'}}>tek sayfada</span>, etkileşimli.
      </div>
      <div style={{fontSize: 17, color:'var(--text-secondary)', marginTop: 16, maxWidth: 720, lineHeight: 1.55}}>
        Müşteri telefonu, mutfak ekranı, kasa paneli ve garson tableti. Aşağıdaki dört yüzey gerçek ürünün aynısı, tıklayın, sipariş verin, ödeyin, mutfağa düşsün. Odaklanmak için herhangi bir ekrana çift tıklayın.
      </div>
      <div style={{display:'flex', gap: 24, marginTop: 28, flexWrap:'wrap'}}>
        <Stat num="4" label="Uygulama yüzeyi"/>
        <Stat num="14" label="Etkileşimli ekran"/>
        <Stat num="3sn" label="KDS polling"/>
        <Stat num="4-8s" label="Kurulum süresi"/>
      </div>
    </div>
  );
}

function Stat({ num, label }) {
  return (
    <div>
      <div style={{fontSize: 28, fontWeight: 800, color:'var(--brand-500)', fontFamily:'var(--font-mono)', letterSpacing:'-0.02em'}}>{num}</div>
      <div style={{fontSize: 12, color:'var(--text-muted)', fontWeight: 600, textTransform:'uppercase', letterSpacing:'0.08em'}}>{label}</div>
    </div>
  );
}

function App() {
  return (
    <>
      <Hero/>
      <DesignCanvas>
        <DCSection id="customer" title="① Müşteri · iPhone / PWA" subtitle="QR okut → menü → sepet → 3DS ödeme → sipariş durumu">
          <DCArtboard id="pwa-qr" label="1. QR okuma" width={430} height={820}>
            <CustomerPWA initialScreen="qr"/>
          </DCArtboard>
          <DCArtboard id="pwa-menu" label="2. Menü + sepet" width={430} height={820}>
            <CustomerPWA initialScreen="menu"/>
          </DCArtboard>
          <DCArtboard id="pwa-status" label="3. Canlı sipariş durumu" width={430} height={820}>
            <CustomerPWA initialScreen="status"/>
          </DCArtboard>
        </DCSection>

        <DCSection id="kds" title="② Mutfak · KDS (Kitchen Display)" subtitle="3 kolon · canlı timer · 10dk/20dk uyarı · geri al">
          <DCArtboard id="kds-main" label="Ana mutfak ekranı · 1280×760" width={1320} height={800}>
            <KDS embedded/>
          </DCArtboard>
        </DCSection>

        <DCSection id="cashier" title="③ Restoran · Kasa / Yönetim Paneli" subtitle="Masa planı, siparişler, menü editörü, raporlar, ayarlar">
          <DCArtboard id="cashier-floor" label="Masa planı + günlük KPI'lar" width={1440} height={900}>
            <CashierPanel/>
          </DCArtboard>
        </DCSection>

        <DCSection id="waiter" title="④ Garson · Tablet" subtitle="8-10&quot; dikey tablet · masa durumu · aktif adisyon">
          <DCArtboard id="waiter-tables" label="Masa listesi + alarm" width={520} height={820}>
            <WaiterApp/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
