version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hashtap
      POSTGRES_PASSWORD: hashtap
      POSTGRES_DB: hashtap
    ports:
      - "5432:5432"
    volumes:
      - hashtap_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hashtap"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - hashtap_redis:/data

  adminer:
    image: adminer:4
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8081:8080"

volumes:
  hashtap_pg:
  hashtap_redis:
