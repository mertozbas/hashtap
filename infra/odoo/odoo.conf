[options]
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo
admin_passwd = admin
db_host = odoo-db
db_port = 5432
db_user = odoo
db_password = odoo
db_maxconn = 64
without_demo = False
db_filter = ^hashtap$
list_db = False
log_level = info
workers = 0
max_cron_threads = 1
proxy_mode = False

; On-premise tek-kiracı: tek "hashtap" DB'si, DB seçici kapalı.
; Production öncesi: admin_passwd değişir, proxy_mode=True, workers>0.
